name: Build PDF (latexmk + BibTeX)

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository tree (top + src)
        run: |
          set -e
          echo "=== TOP ==="
          ls -la
          echo "=== SRC ==="
          ls -la src
          echo "=== SRC/BIB ==="
          ls -la src/bib || true

      - name: Compile src/main.tex
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: src
          root_file: main.tex
          args: >-
            -pdf
            -interaction=nonstopmode
            -halt-on-error
            -file-line-error
            -synctex=1

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: src/*.pdf

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            src/*.log
            src/*.aux
            src/*.bbl
            src/*.blg
            src/*.out
            src/*.toc
            src/*.lof
            src/*.lot
            src/*.synctex.gz
            src/*.fls
            src/*.fdb_latexmk
