name: Build PDF (Diamond CI: DEV nonfatal, RELEASE strict)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode: dev (nonfatal refs/cites) or release (strict)"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - release

permissions:
  contents: read

concurrency:
  group: latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      WORKDIR: src
      ROOTFILE: main.tex
      MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository tree (top + src)
        run: |
          set -e
          echo "=== TOP ==="
          ls -la
          echo "=== SRC ==="
          ls -la "${WORKDIR}"
          echo "=== SRC/BIB ==="
          ls -la "${WORKDIR}/bib" || true
          echo "=== MODE ==="
          echo "${MODE}"

      # ------------------------------------------------------------
      # DEV build: always produce PDF if LaTeX can run.
      # Do NOT fail the job on unresolved refs/cites during refactoring.
      # ------------------------------------------------------------
      - name: Compile (DEV: nonfatal refs/cites)
        if: env.MODE == 'dev'
        uses: xu-cheng/latex-action@v3
        continue-on-error: true
        with:
          working_directory: ${{ env.WORKDIR }}
          root_file: ${{ env.ROOTFILE }}
          args: >-
            -pdf
            -interaction=nonstopmode
            -file-line-error
            -synctex=1

      # ------------------------------------------------------------
      # RELEASE build: strict (halts on real LaTeX errors).
      # Use this when structure is stable.
      # ------------------------------------------------------------
      - name: Compile (RELEASE: strict)
        if: env.MODE == 'release'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ${{ env.WORKDIR }}
          root_file: ${{ env.ROOTFILE }}
          args: >-
            -pdf
            -interaction=nonstopmode
            -halt-on-error
            -file-line-error
            -synctex=1

      # Optional: summarize the most common “nonfatal” issues in DEV logs
      - name: Summarize common warnings (DEV)
        if: always()
        run: |
          set -e
          LOG="${WORKDIR}/main.log"
          if [ -f "$LOG" ]; then
            echo "=== WARNING SUMMARY (grep) ==="
            grep -nE "Undefined control sequence|LaTeX Warning: Reference|LaTeX Warning: Citation|There were undefined references|There were undefined citations" "$LOG" || true
          else
            echo "No main.log found."
          fi

      - name: Upload PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: |
            src/*.pdf

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            src/*.log
            src/*.aux
            src/*.bbl
            src/*.blg
            src/*.out
            src/*.toc
            src/*.lof
            src/*.lot
            src/*.synctex.gz
            src/*.fls
            src/*.fdb_latexmk
