name: pdf

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF (latexmk + BibTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -synctex=1

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: main.pdf

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            *.log
            *.aux
            *.bbl
            *.blg
            *.out
            *.toc
            *.lof
            *.lot
