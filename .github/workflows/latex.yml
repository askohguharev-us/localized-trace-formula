name: pdf

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check layout
        run: |
          set -euo pipefail

          test -f main.tex || { echo "::error ::src/main.tex not found"; exit 2; }
          test -f bib/references.bib || { echo "::error ::src/bib/references.bib not found"; exit 2; }

          for f in macros/environments.tex macros/operators.tex macros/house-style.tex; do
            test -f "$f" || { echo "::error ::missing src/$f"; exit 2; }
          done

          # forbid dangerous \input paths
          BAD=$(grep -R -nE '\\input\{(sub/|/|\\\.\.)' . || true)
          if [ -n "$BAD" ]; then
            echo "::error ::Forbidden \\input path(s) detected:"
            echo "$BAD"
            exit 3
          fi

      - name: Compile PDF (latexmk + BibTeX, XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: src
          latexmk_use_xelatex: true
          args: -file-line-error -halt-on-error -interaction=nonstopmode -synctex=1
          extra_packages: |
            bbm
            mathrsfs
            microtype
            enumitem
            float
            caption
            subcaption
            tcolorbox
            cleveref
            xcolor
            etoolbox

      - name: Upload PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monograph-pdf
          path: src/main.pdf

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            src/main.log
            src/main.aux
            src/main.blg
            src/main.bbl
            src/main.toc
            src/main.out
            src/main.synctex.gz
