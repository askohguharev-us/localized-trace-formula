name: pdf

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check layout (hard)
        run: |
          set -euo pipefail

          # Required core files
          test -f main.tex || { echo "::error ::src/main.tex not found"; exit 2; }
          test -d bib || { echo "::error ::src/bib directory not found"; exit 2; }
          test -f bib/references.bib || { echo "::error ::src/bib/references.bib not found"; exit 2; }

          # Required macro files (adjust list if you renamed them)
          for f in macros/environments.tex macros/operators.tex macros/house-style.tex; do
            test -f "$f" || { echo "::error ::missing src/$f"; exit 2; }
          done

          # Forbid dangerous paths in TeX inputs/includes
          #  - ../  absolute paths  or \input{sub/...} that breaks your repo contract
          BAD_INPUT=$(grep -R -nE '\\(input|include)\s*\{(\.\./|/|sub/)' . || true)
          if [[ -n "$BAD_INPUT" ]]; then
            echo "::error ::Forbidden \\input/\\include path(s) detected:"
            echo "$BAD_INPUT"
            exit 3
          fi

          # Forbid dangerous paths in includegraphics as well
          BAD_GFX=$(grep -R -nE '\\includegraphics(\[[^]]*\])?\{(\.\./|/)' . || true)
          if [[ -n "$BAD_GFX" ]]; then
            echo "::error ::Forbidden \\includegraphics path(s) detected:"
            echo "$BAD_GFX"
            exit 3
          fi

          echo "Layout OK."

      - name: Compile (latexmk + BibTeX, XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: src
          root_file: main.tex
          latexmk_use_xelatex: true
          args: >-
            -file-line-error
            -halt-on-error
            -interaction=nonstopmode
          pre_compile: |
            set -euo pipefail
            tlmgr option repository https://mirror.ctan.org/systems/texlive/tlnet || true

            # Minimal install set; add packages ONLY when errors demand it
            tlmgr install \
              latexmk \
              xetex \
              bibtex \
              amsfonts amsmath mathtools \
              geometry fancyhdr microtype \
              hyperref xcolor cleveref \
              enumitem \
              caption subcaption float \
              tcolorbox etoolbox \
              bbm mathrsfs \
              || true

            echo "[tlmgr pre_compile finished]"

      - name: Upload PDF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monograph-pdf
          path: src/main.pdf

      - name: Upload LaTeX logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            src/main.log
            src/main.blg
            src/main.bbl
            src/main.aux
