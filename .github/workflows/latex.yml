name: pdf

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Чтобы не было очередей/фантомных отмен: новый пуш отменяет предыдущий ран на той же ветке
concurrency:
  group: latex-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pdf:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check layout
        shell: bash
        run: |
          set -euo pipefail

          test -f main.tex || { echo "::error ::src/main.tex not found"; exit 2; }
          test -f bib/references.bib || { echo "::error ::src/bib/references.bib not found"; exit 2; }

          for f in macros/environments.tex macros/operators.tex macros/house-style.tex; do
            test -f "$f" || { echo "::error ::missing src/$f"; exit 2; }
          done

          # Запрещаем path traversal и абсолютные пути в \input/\include
          BAD=$(grep -R -nE '\\(input|include)\{(\.\./|/)' . || true)
          if [ -n "$BAD" ]; then
            echo "::error ::Forbidden \\input/\\include path(s) detected:"
            echo "$BAD"
            exit 3
          fi

      - name: Compile with TeX Live (latexmk + BibTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: src
          latexmk_use_xelatex: true
          args: -file-line-error -halt-on-error -interaction=nonstopmode -synctex=1
          pre_compile: |
            tlmgr option repository https://mirror.ctan.org/systems/texlive/tlnet || true
            tlmgr update --self --all || true
            tlmgr install \
              bbm mathrsfs microtype enumitem float caption subcaption \
              tcolorbox cleveref xcolor etoolbox csquotes \
              amsfonts amsmath amsthm mathtools \
              geometry hyperref bookmark \
              bibtex bibtexu || true
            echo "[tlmgr pre_compile finished]"

      - name: Upload PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monograph-pdf
          path: src/main.pdf
          if-no-files-found: error

      # Логи грузим всегда (и при успехе тоже — полезно для аудита)
      - name: Upload LaTeX logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            src/main.log
            src/main.aux
            src/main.blg
            src/main.bbl
            src/main.fls
            src/main.fdb_latexmk
          if-no-files-found: ignore
