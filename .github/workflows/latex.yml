name: pdf

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: latex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check layout
        run: |
          set -euo pipefail

          test -f main.tex || { echo "::error ::src/main.tex not found"; exit 2; }
          test -f bib/references.bib || { echo "::error ::src/bib/references.bib not found"; exit 2; }

          for f in macros/environments.tex macros/operators.tex macros/house-style.tex; do
            test -f "$f" || { echo "::error ::missing src/$f"; exit 2; }
          done

          # Forbid dangerous \input/\include paths (absolute, parent, hidden-dot)
          BAD=$(
            grep -R -nE '\\(input|include)\s*\{(\.\./|/|\\\.\.|\.{2}/)' . || true
          )
          if [ -n "$BAD" ]; then
            echo "::error ::Forbidden \\input/\\include path(s) detected:"
            echo "$BAD"
            exit 3
          fi

          echo "[layout OK]"

      - name: Compile with TeX Live (latexmk + BibTeX)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: src
          root_file: main.tex
          latexmk_use_xelatex: true
          args: -file-line-error -halt-on-error -interaction=nonstopmode

          # IMPORTANT:
          #  - do NOT tlmgr update --self --all (unstable & slow on Actions runners)
          #  - only install missing packages if needed
          pre_compile: |
            set -euo pipefail
            tlmgr option repository https://mirror.ctan.org/systems/texlive/tlnet || true
            tlmgr install \
              bbm mathrsfs microtype enumitem float caption subcaption \
              tcolorbox cleveref xcolor etoolbox \
              amsfonts amsmath amssymb mathtools \
              hyperref geometry fancyhdr setspace booktabs \
              bibtex || true
            echo "[tlmgr pre_compile finished]"

      - name: Upload PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monograph-pdf
          path: src/main.pdf
          if-no-files-found: error

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            src/main.log
            src/main.blg
            src/main.bbl
            src/main.aux
          if-no-files-found: warn
